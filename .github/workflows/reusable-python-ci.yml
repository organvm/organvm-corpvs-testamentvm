# Reusable Python CI template (GH#94, Template 1: Python CI).
# Calling repo:
#   jobs:
#     ci:
#       uses: a-organvm/organvm-corpvs-testamentvm/.github/workflows/reusable-python-ci.yml@main
#       with:
#         python-version: "3.12"
#         working-directory: "."
name: reusable-python-ci

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: false
        default: "3.12"
      working-directory:
        type: string
        required: false
        default: "."
      coverage-threshold:
        description: "Minimum % line coverage (0 disables the gate)."
        type: number
        required: false
        default: 0

permissions:
  contents: read

jobs:
  python-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install -e . || true; fi
          pip install ruff pytest pytest-cov
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest + coverage)
        run: |
          pytest --cov=. --cov-report=term-missing --cov-report=xml \
            $([ "${{ inputs.coverage-threshold }}" != "0" ] && echo "--cov-fail-under=${{ inputs.coverage-threshold }}")
