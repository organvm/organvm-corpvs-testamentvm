# Reusable Python CI template (GH#94, Template 1: Python CI).
# Calling repo:
#   jobs:
#     ci:
#       uses: a-organvm/organvm-corpvs-testamentvm/.github/workflows/reusable-python-ci.yml@main
#       with:
#         python-version: "3.12"
#         working-directory: "."
name: reusable-python-ci

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: false
        default: "3.12"
      working-directory:
        type: string
        required: false
        default: "."
      coverage-threshold:
        description: "Minimum % line coverage (0 disables the gate)."
        type: number
        required: false
        default: 0

permissions:
  contents: read

jobs:
  python-ci:
    runs-on: ubuntu-latest
    # NB: working-directory is applied per run-step below — `defaults.run` does not
    # support contexts/expressions.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          # No `cache: pip` here: setup-python's pip cache fails when a repo has
          # neither requirements.txt nor pyproject.toml (a valid scripts/tests-only
          # pattern in this ecosystem). Callers that want caching can add it.
      - name: Install
        working-directory: ${{ inputs.working-directory }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # A missing `dev` extra is only a pip WARNING (exit 0), so no fallback is
          # needed: a non-zero exit here is a genuine build/dependency failure and
          # must fail the job rather than be masked.
          if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi
          pip install ruff pytest pytest-cov
      - name: Lint (ruff)
        working-directory: ${{ inputs.working-directory }}
        run: ruff check .
      - name: Test (pytest + coverage)
        working-directory: ${{ inputs.working-directory }}
        env:
          COV_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          extra=""
          if [ "$COV_THRESHOLD" != "0" ]; then extra="--cov-fail-under=$COV_THRESHOLD"; fi
          pytest --cov=. --cov-report=term-missing --cov-report=xml $extra
