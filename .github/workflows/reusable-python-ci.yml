# Reusable Python CI template (GH#94, Template 1: Python CI).
# Calling repo:
#   jobs:
#     ci:
#       uses: a-organvm/organvm-corpvs-testamentvm/.github/workflows/reusable-python-ci.yml@main
#       with:
#         python-version: "3.12"
#         working-directory: "."
name: reusable-python-ci

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: false
        default: "3.12"
      working-directory:
        type: string
        required: false
        default: "."
      coverage-threshold:
        description: "Minimum % line coverage (0 disables the gate)."
        type: number
        required: false
        default: 0

permissions:
  contents: read

jobs:
  python-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Try the dev extra first; fall back to a plain editable install. A genuine
          # build failure of the plain install propagates (no `|| true` masking) — only
          # the "no [dev] extra defined" case is tolerated via the fallback.
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install -e .; fi
          pip install ruff pytest pytest-cov
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest + coverage)
        env:
          COV_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          extra=""
          if [ "$COV_THRESHOLD" != "0" ]; then extra="--cov-fail-under=$COV_THRESHOLD"; fi
          pytest --cov=. --cov-report=term-missing --cov-report=xml $extra
