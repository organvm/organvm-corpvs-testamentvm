# Reusable TypeScript CI template (GH#94, Template 2: TypeScript CI).
# Calling repo:
#   jobs:
#     ci:
#       uses: a-organvm/organvm-corpvs-testamentvm/.github/workflows/reusable-typescript-ci.yml@main
#       with:
#         node-version: "20"
name: reusable-typescript-ci

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        required: false
        default: "20"
      working-directory:
        type: string
        required: false
        default: "."
      package-manager:
        description: "npm | pnpm | yarn"
        type: string
        required: false
        default: "npm"

permissions:
  contents: read

jobs:
  typescript-ci:
    runs-on: ubuntu-latest
    # NB: working-directory is applied per run-step below. `defaults.run` does not
    # support contexts/expressions, so the input is referenced on each step.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          # Only cache for npm, which is always present. pnpm/yarn are enabled via
          # corepack in the install step (after Node exists); caching them here would
          # run before the manager is installed, which setup-node forbids.
          cache: ${{ inputs.package-manager == 'npm' && 'npm' || '' }}
          # Point the cache at the lockfile in the selected working-directory so
          # subdirectory projects (e.g. frontend/package-lock.json) cache correctly.
          cache-dependency-path: ${{ inputs.package-manager == 'npm' && format('{0}/package-lock.json', inputs.working-directory) || '' }}
      - name: Install
        working-directory: ${{ inputs.working-directory }}
        env:
          PM: ${{ inputs.package-manager }}
        run: |
          case "$PM" in
            pnpm) corepack enable && pnpm install --frozen-lockfile ;;
            yarn) corepack enable && yarn install --frozen-lockfile ;;
            *)    npm ci ;;
          esac
      - name: Lint / Typecheck / Test
        working-directory: ${{ inputs.working-directory }}
        env:
          PM: ${{ inputs.package-manager }}
        run: |
          # Dispatch package scripts through the SELECTED manager so pnpm/yarn
          # workspaces resolve commands from the same environment just installed.
          has_script() { node -e "process.exit(((require('./package.json').scripts||{})['$1'])?0:1)" 2>/dev/null; }
          run_script() { if has_script "$1"; then echo "→ $PM run $1"; "$PM" run "$1"; else echo "skip: no '$1' script"; fi; }
          run_script lint
          # `--` forwards --noEmit to tsc rather than letting npm/pnpm consume it.
          if [ -f tsconfig.json ]; then "$PM" exec -- tsc --noEmit || npx --no-install tsc --noEmit; fi
          run_script test
