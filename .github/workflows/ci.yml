name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed-contract:
    uses: ./.github/workflows/seed-contract--check-jsonschema.yml

  aesthetic-contract:
    uses: ./.github/workflows/aesthetic-contract--stylelint.yml
    with:
      working_directory: portfolio-site
      css_glob: src/styles/**/*.css
      config_file: ../.stylelintrc.json

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate structure
        run: |
          echo "Repository structure:"
          ls -la
          echo ""
          echo "README check:"
          if [ -f "README.md" ]; then
            echo "::notice::README.md found"
            wc -w README.md
          else
            echo "::warning::No README.md found"
          fi
          echo ""
          echo "License check:"
          if [ -f "LICENSE" ] || [ -f "LICENSE.md" ]; then
            echo "::notice::License file found"
          else
            echo "::warning::No license file found"
          fi

      - name: Success
        run: echo "::notice::Minimal CI validation passed"

  portfolio-site:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build portfolio with committed data snapshot policy
        run: |
          cd portfolio-site
          npm ci
          npm run build
