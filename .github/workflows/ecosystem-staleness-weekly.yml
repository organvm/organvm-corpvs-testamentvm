name: Ecosystem Staleness Check
on:
  schedule:
    - cron: '0 8 * * 3'  # Wednesday 08:00 UTC
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install organvm-engine
        run: pip install git+https://github.com/meta-organvm/organvm-engine.git
      - name: Run staleness check
        run: organvm ecosystem staleness --json > staleness-report.json || true
      - name: Check for stale items
        id: check
        run: |
          count=$(python3 -c "import json; d=json.load(open('staleness-report.json')); print(sum(len(v) for v in d.values()))")
          echo "stale_count=$count" >> "$GITHUB_OUTPUT"
      - name: Create issue if stale
        if: steps.check.outputs.stale_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Ecosystem staleness detected (${{ steps.check.outputs.stale_count }} items)" \
            --body "$(cat staleness-report.json | python3 -c 'import json,sys; d=json.load(sys.stdin); [print(f"- **{r}**: {len(items)} stale") for r,items in d.items()]')" \
            --label ecosystem
