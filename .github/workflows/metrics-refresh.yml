name: Metrics Refresh

# Auto-refresh system-metrics.json and propagation into documentation.
# Triggers: registry push, daily cron, manual dispatch.

on:
  push:
    paths:
      - registry-v2.json
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml
          pip install git+https://github.com/meta-organvm/organvm-engine.git
          pip install git+https://github.com/meta-organvm/organvm-ontologia.git

      - name: Calculate metrics
        env:
          GH_TOKEN: ${{ secrets.CROSS_ORG_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/calculate-metrics.py

      - name: Propagate metrics
        run: |
          python3 scripts/propagate-metrics.py

      - name: Build system snapshot
        run: |
          python3 -c "
          from organvm_engine.metrics.snapshot import build_system_snapshot, write_system_snapshot
          from organvm_engine.metrics.calculator import compute_metrics
          from organvm_engine.registry.loader import load_registry
          from pathlib import Path

          import json
          registry = load_registry(Path('registry-v2.json'))
          computed = compute_metrics(registry)
          # Load full metrics (includes manual section with word counts, essays)
          metrics_full = json.loads(Path('system-metrics.json').read_text()) if Path('system-metrics.json').exists() else {'computed': computed, 'manual': {}}
          snapshot = build_system_snapshot(registry, computed, metrics_full=metrics_full)
          write_system_snapshot(snapshot, Path('system-snapshot.json'))
          print(f'Snapshot: {len(snapshot.get(\"organs\", []))} organs, {snapshot[\"system\"][\"total_repos\"]} repos')
          "

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No metrics changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: auto-refresh metrics ${DATE}"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger portfolio data refresh
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_ORG_TOKEN }}
        run: |
          gh api repos/4444J99/portfolio/dispatches \
            -f event_type=metrics-refresh || echo "::warning::Failed to trigger portfolio data refresh. Check CROSS_ORG_TOKEN secret."
